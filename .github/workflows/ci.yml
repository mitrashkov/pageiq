name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright
      run: |
        playwright install chromium
        playwright install-deps

    - name: Run tests
      run: |
        python -m pytest tests/ -v \
          --cov=app.api.v1.endpoints \
          --cov=app.services.analyzer \
          --cov=app.services.batch_status \
          --cov=app.services.industry_detector \
          --cov=app.services.screenshot \
          --cov=app.tasks.batch_tasks \
          --cov=app.core.redis \
          --cov-report=xml \
          --cov-fail-under=95
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black isort mypy

    - name: Run linters
      run: |
        flake8 app/ tests/
        black --check app/ tests/
        isort --check-only app/ tests/
        mypy app/

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -f docker/Dockerfile -t pageiq-api .

    - name: Test Docker image
      run: |
        docker run --rm pageiq-api python -c "import app.main; print('Import successful')"