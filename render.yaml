services:
  - type: web
    name: pageiq-api
    env: python
    buildCommand: chmod +x build.sh start.sh && ./build.sh
    startCommand: ./start.sh
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright
      - key: XDG_CACHE_HOME
        value: /opt/render/project/src/.cache
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: "sqlite+pysqlite:///./pageiq.db"
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      - key: CELERY_BROKER_URL
        value: "redis://localhost:6379/0"
      - key: CELERY_RESULT_BACKEND
        value: "redis://localhost:6379/0"
