services:
  - type: web
    name: pageiq-api
    env: python
    pythonVersion: 3.11
    buildCommand: pip install --no-cache-dir -r requirements.txt && playwright install --with-deps chromium
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: "sqlite+pysqlite:///./pageiq.db"
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      - key: CELERY_BROKER_URL
        value: "redis://localhost:6379/0"
      - key: CELERY_RESULT_BACKEND
        value: "redis://localhost:6379/0"
